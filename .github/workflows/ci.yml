name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action-runtime-guard:
    name: Action runtimes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject deprecated JavaScript action runtimes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/scripts/check-action-runtimes.sh

  build-gate:
    name: Build Gate
    needs: action-runtime-guard
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all derivations
        run: >-
          nix build --quiet
          .#default
          .#unit-tests
          .#checks.x86_64-linux.cabal-check
          .#checks.x86_64-linux.haddock
          .#checks.x86_64-linux.seed-image-determinism
          .#devShells.x86_64-linux.default.inputDerivation

  scenario-schema:
    name: Scenario schema
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Validate example scenarios
        run: nix build --quiet .#checks.x86_64-linux.scenario-schema

  bake-determinism:
    name: Bake determinism
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Bake examples twice and diff
        run: nix build --quiet .#checks.x86_64-linux.example-bake-determinism

  compose-acceptance:
    name: Compose acceptance
    needs: build-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check Docker
        run: docker version && docker compose version
      - name: Install acceptance dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Bake examples
        run: |
          set -euo pipefail
          nix --quiet run . -- bake \
            --scenario examples/scenarios/local-fast.json \
            --out tmp/bakes/local-fast
          nix --quiet run . -- bake \
            --scenario examples/scenarios/normal.json \
            --out tmp/bakes/normal
      - name: Run local-fast compose acceptance
        run: compose/acceptance/run.sh local-fast tmp/bakes/local-fast
      - name: Run normal compose acceptance
        run: compose/acceptance/run.sh normal tmp/bakes/normal

  unit-tests:
    name: Unit tests
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run unit tests
        run: nix --quiet develop -c nix run .#unit-tests --quiet

  formatting:
    name: Formatting
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: fourmolu -m check
        run: nix --quiet develop -c just format-check

  hlint:
    name: HLint
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run HLint
        run: nix --quiet develop -c just hlint
