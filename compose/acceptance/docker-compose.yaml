services:
  cardano-node:
    image: ${CARDANO_NODE_IMAGE:-ghcr.io/intersectmbo/cardano-node@sha256:3275d357053d21f3220f74b0854fd584e1fe322dfa1bbb78effd760c3191d14c}
    command: ["run"]
    environment:
      CARDANO_BLOCK_PRODUCER: "true"
      CARDANO_CONFIG: /assets/genesis/config.json
      CARDANO_DATABASE_PATH: /data/db
      CARDANO_SOCKET_PATH: /ipc/node.socket
      CARDANO_SHELLEY_KES_KEY: /assets/pools/pool-a/keys/kes.skey
      CARDANO_SHELLEY_OPERATIONAL_CERTIFICATE: /assets/pools/pool-a/keys/opcert.cert
      CARDANO_SHELLEY_VRF_KEY: /assets/pools/pool-a/keys/vrf.skey
      CARDANO_TOPOLOGY: /assets/topology.json
    stop_signal: SIGINT
    volumes:
      - ${ACCEPTANCE_RUNTIME_DIR:?ACCEPTANCE_RUNTIME_DIR must be set}:/assets:ro
      - node-db:/data/db
      - node-ipc:/ipc

volumes:
  node-db:
  node-ipc:
